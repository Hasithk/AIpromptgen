name: Daily Blog Generation

on:
  schedule:
    # Runs daily at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      count:
        description: 'Number of blog posts to generate (1-5)'
        required: false
        default: '2'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NEWS_API_BASE_URL: https://newsapi.org/v2
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Blog Posts
        run: |
          set -euo pipefail
          
          COUNT=${{ github.event.inputs.count || '2' }}
          echo "🚀 Generating ${COUNT} daily blog post(s)..."
          
          # Push schema to database and run blog generation
          npx prisma db push --skip-generate || true
          node ./scripts/generate-blog-direct.js "$COUNT"

      - name: Log Result
        if: always()
        run: |
          echo "📝 Daily blog generation workflow finished at $(date -u)"
